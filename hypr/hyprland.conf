#######################################################################################
# CONFIGURAÇÃO HYPRLAND >:D
#######################################################################################

monitor=,preferred,auto,auto
$codeEditor = code
$terminal = kitty
$fileManager = nautilus
$terminalFileManager = yazi
$browser = firefox
$privateBrowser = librewolf
$menu = qs -c noctalia-shell ipc call launcher toggle
$mainMod = SUPER

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xhost +local:
exec-once = qs -c noctalia-shell
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet &
exec-once = swaybg -i '/home/duzentos/Wallpapers/wallpaper.jpg' -m fill
exec-once = emote
exec-once = udiskie &
exec-once = sleep 2 && gio launch "/usr/share/applications/proton.vpn.app.gtk.desktop"


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_PRIMARY_SELECTION,false

#############
### INPUT ###
#############
input {
    kb_layout = br
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}


misc {
    # Isso impede que o Hyprland use a "Primary Selection" (o buffer do botão do meio)
    vfr = true
    disable_hyprland_logo = true # (opcional)
    
    # A opção abaixo é a chave:
    middle_click_paste = false
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 10
    gaps_out = 10
    border_size = 2    

    # Cores Padrão (Cyan/Green)
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 3
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
	    enabled = true
	    size = 3
	    passes = 2
	    vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

@windowrule = float, class:Firefox, title:.*Picture-in-Picture.*, pseudotile:off
###################
### KEYBINDINGS ###
###################

# Default things
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Apps
bind = $mainMod, T, exec, $terminal
bind = CTRL ALT, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, C, exec, code
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, W, exec, $browser
bind = $mainMod SHIFT, W, exec, $privateBrowser
bind = $mainMod SHIFT, space, togglefloating,
bind = SUPER, period, exec, emote
bind = $mainMod SHIFT, E, exec, $terminal -e $terminalFileManager

# Saída com confirmação (Swaynag)
bind = $mainMod SHIFT, Q, exec, swaynag -t warning -m "Deseja sair do Hyprland?" -B "Sim, sair!" "hyprctl dispatch exit"
# Movimentação (Apenas Setas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 0


# Navegação Sequencial
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod CTRL, left, workspace, r-1
bind = $mainMod CTRL SHIFT, right, movetoworkspace, r+1
bind = $mainMod CTRL SHIFT, left, movetoworkspace, r-1


# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Mídia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Prints
bind = , Print, exec, grim - | wl-copy && notify-send "Screenshot capturada"
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Área copiada"

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

source = /home/duzentos/.config/hypr/noctalia/noctalia-colors.conf

##############################
### AUTOSTART AFTER LOGIN  ###
##############################
